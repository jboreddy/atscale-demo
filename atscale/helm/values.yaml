# AtScale 2026.5.2 - Minimal POC Values Override
# Chart: oci://docker.io/atscaleinc/atscale
# Target: C360 POC on EKS (2x m5.2xlarge nodes)

global:
  ingressDomain: "atscale.local"
  atscale:
    tls:
      existingSecret: "atscale-tls"
    telemetry:
      enabled: false  # Disable telemetry for POC

# Disable monitoring for POC (minimal footprint)
atscale-monitor:
  enabled: false

# Engine - core query service (minimal resources for POC)
atscale-engine:
  resources:
    requests:
      cpu: "1000m"
      memory: "4096Mi"
    limits:
      cpu: "4000m"
      memory: "16000Mi"

# SML service
atscale-sml:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

# API service
atscale-api:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

# MCP service (for AI agent integration)
atscale-mcp:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

# Proxy (Kong) - external access
atscale-proxy:
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

# Database (embedded PostgreSQL - single instance for POC)
db:
  persistence:
    enabled: true
    storageClass: "gp2"
    size: "10Gi"

# Redis (single master for POC)
redis:
  master:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    persistence:
      enabled: true
      storageClass: "gp2"
      size: "5Gi"
  replica:
    replicaCount: 0  # No replicas for POC

# Keycloak (auth - single replica)
keycloak:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"

# In-memory aggregations
in-mem-aggs:
  enabled: false  # Disable for POC to save resources

# Telemetry collector
telemetry:
  enabled: false  # Disable for POC

# Ingress Gateway (nginx) - fix for large Keycloak cookies
# Without this, browsers get "Request Header Or Cookie Too Large" (400)
atscale-proxy:
  nginxHttpConfig: |
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;
